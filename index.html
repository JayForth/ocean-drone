<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ocean Drone</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Courier New', monospace;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #canvas-container {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    canvas {
      display: block;
    }

    #start-screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(10, 10, 10, 0.95);
      cursor: pointer;
      transition: opacity 0.5s ease;
    }

    #start-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #start-screen h1 {
      font-size: 2rem;
      font-weight: 300;
      letter-spacing: 0.3em;
      margin-bottom: 1rem;
    }

    #start-screen p {
      font-size: 0.9rem;
      opacity: 0.6;
      letter-spacing: 0.1em;
    }

    #info {
      position: fixed;
      bottom: 20px;
      left: 20px;
      font-size: 0.8rem;
      opacity: 0.5;
    }

    #ship-count {
      position: fixed;
      top: 20px;
      right: 20px;
      font-size: 0.9rem;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div id="canvas-container">
    <canvas id="sonar"></canvas>
    <div id="start-screen">
      <h1>OCEAN DRONE</h1>
      <p>click anywhere to begin</p>
    </div>
  </div>
  <div id="info">English Channel</div>
  <div id="ship-count">Ships: 0</div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
